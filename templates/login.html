{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:400px;margin:50px auto;">
    <h2 style="margin-bottom:20px;">Login to TaskFlow</h2>
    <form method="POST">
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Login</button>
    </form>
    <p style="margin-top:15px;text-align:center;">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
</div>
{% endblock %}
