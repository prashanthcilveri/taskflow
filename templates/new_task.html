{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:500px;margin:30px auto;">
    <h2 style="margin-bottom:20px;">Create New Task</h2>
    <form method="POST">
        <div class="form-group">
            <label>Task Title</label>
            <input type="text" name="title" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4"></textarea>
        </div>
        <div class="form-group">
            <label>Assign To</label>
            <select name="assigned_to">
                <option value="">-- Select Member --</option>
                {% for user in users %}
                <option value="{{ user.id }}">{{ user.username }} ({{ user.role }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Due Date</label>
            <input type="date" name="due_date">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Create Task</button>
    </form>
    <p style="margin-top:15px;text-align:center;"><a href="{{ url_for('view_project', project_id=project_id) }}">← Back to Project</a></p>
</div>
{% endblock %}
