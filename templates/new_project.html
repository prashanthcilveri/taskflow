{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:500px;margin:30px auto;">
    <h2 style="margin-bottom:20px;">Create New Project</h2>
    <form method="POST">
        <div class="form-group">
            <label>Project Name</label>
            <input type="text" name="name" required>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" rows="4"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Create Project</button>
    </form>
    <p style="margin-top:15px;text-align:center;"><a href="{{ url_for('index') }}">← Back to Home</a></p>
</div>
{% endblock %}
