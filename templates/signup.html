{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:400px;margin:50px auto;">
    <h2 style="margin-bottom:20px;">Create Account</h2>
    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label>Role</label>
            <select name="role">
                <option value="member">Member</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;">Sign Up</button>
    </form>
    <p style="margin-top:15px;text-align:center;">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
